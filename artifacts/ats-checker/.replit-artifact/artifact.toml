kind = "web"
previewPath = "/"
title = "ATS Resume Checker"
version = "1.0.0"
id = "artifacts/ats-checker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18563
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/ats-checker run dev"

[services.env]
PORT = "18563"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/ats-checker", "run", "build"]
publicDir = "artifacts/ats-checker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
